  native-windows-amd64:
    if: contains(github.event.pull_request.body, '[native]') || contains(github.event.pull_request.body, '[native-windows]') || contains(github.event.pull_request.body, '[native-windows-amd64]')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
