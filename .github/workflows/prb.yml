        distribution: temurin
        cache: gradle
    - name: Install deps
      run: dnf install -y git binutils gcc glibc-devel zlib-devel libstdc++-static glibc-langpack-en
    - name: Build native executable
      shell: bash
      run: ./gradlew --info --stacktrace buildNative
    - name: Upload native executable
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: pkl-lsp-native-linux-aarch64
        path: build/executable/*
    - name: Upload Test Result XML
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-xml-native-linux-aarch64
        path: build/test-results/**/*.xml
        if-no-files-found: ignore
    container:
      image: redhat/ubi8:8.10
  native-windows-amd64:
    if: contains(github.event.pull_request.body, '[native]') || contains(github.event.pull_request.body, '[native-windows]') || contains(github.event.pull_request.body, '[native-windows-amd64]')
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
        fetch-depth: 0
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '25'
        distribution: temurin
        cache: gradle
    - name: Build native executable
      shell: bash
      run: ./gradlew --info --stacktrace buildNative
    - name: Upload native executable
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: pkl-lsp-native-windows-amd64
        path: build/executable/*
    - name: Upload Test Result XML
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-xml-native-windows-amd64
        path: build/test-results/**/*.xml
        if-no-files-found: ignore
  verdict:
    if: always()
    needs:
    - check-pkl-github-actions
    - build
    - native-macos-aarch64
    - native-linux-amd64
    - native-linux-aarch64
    - native-windows-amd64
    runs-on: ubuntu-latest
    steps:
    - name: Failure verdict
      if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
      run: |-
        echo "Some of the required jobs are either failing or were cancelled"
        exit 1
  upload-event-file:
    runs-on: ubuntu-latest
    steps:
    - name: Upload event file
      if: '!cancelled()'
      uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
      with:
        name: test-results-event-file
        path: ${{ github.event_path }}
  check-pkl-github-actions:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false
    - name: Setup Pkl
      id: setup-pkl
      env:
        PKL_VERSION: 0.30.0
        PKL_FILENAME: pkl
        PKL_DOWNLOAD_URL: https://github.com/apple/pkl/releases/download/0.30.0/pkl-linux-amd64
      shell: bash
      run: |-
        DIR="$(mktemp -d /tmp/pkl-$PKL_VERSION-XXXXXX)"
        PKL_EXEC="$DIR/$PKL_FILENAME"
        curl -sfL -o $PKL_EXEC "$PKL_DOWNLOAD_URL"
        chmod +x $PKL_EXEC
        echo "$DIR" >> "$GITHUB_PATH"
        echo "pkl_exec=$PKL_EXEC" >> "$GITHUB_OUTPUT"
    - shell: bash
      run: rm -rf .github/**/[a-z]*.yml
    - shell: bash
      run: pkl eval -m .github/ --project-dir .github/ .github/index.pkl
    - name: check git status
      shell: bash
      run: |-
        if [ -n "$(git status --porcelain)" ]; then
          echo "Running pkl resulted in a diff! You likely need to run 'pkl eval' and commit the changes."
          git diff --name-only
          exit 1
        fi
